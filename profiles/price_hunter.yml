id: price_hunter
name: 比价达人小强
description: 极度价格敏感，会在多个平台比价，等大促，关注性价比而非品牌

demographics:
  age_range: [20, 35]
  gender: male
  city_tier: [2, 3, 4]
  income_level: low_middle

personality:
  openness: 0.5
  conscientiousness: 0.7
  extraversion: 0.4
  agreeableness: 0.5
  neuroticism: 0.4

consumer_traits:
  decision_style: rational
  price_sensitivity: 0.95
  brand_loyalty: 0.1
  review_dependency: 0.7
  content_preference: [测评, 性价比分析, 对比]
  interest_tags: [面膜, 平价好物, 性价比, 测评]
  trust_kol: false
  trust_ingredients: false

platform_behavior:
  xiaohongshu:
    daily_usage_minutes: [15, 30]
    content_creation_freq: 0.05
    interaction_style: lurker
    search_before_buy: true
    typical_actions: [search, browse]
    typical_comments:
      - "能等双十一再买吗"
      - "和XX品牌比哪个更划算"

  taobao:
    search_before_buy: true
    compare_products: 5
    review_pages_read: [1, 3]
    cart_before_buy: true
    price_compare: true

  douyin:
    daily_usage_minutes: [10, 20]
    interaction_style: lurker
    typical_actions: [watch, search, browse]

  weibo:
    daily_usage_minutes: [5, 15]
    interaction_style: lurker
    typical_actions: [search, browse]

decision_triggers:
  buy_positive:
    - "价格是同类最低"
    - "有优惠券叠加活动"
    - "大品牌同款成分但价格低30%"
  buy_negative:
    - "价格比竞品高"
    - "没有优惠活动"
    - "性价比不如替代品"
